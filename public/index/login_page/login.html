<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="login" class="log_cnt-2">

        <div class="left-2">
            <iframe class="anim"
                src="https://lottie.host/embed/131e22f1-7895-42dc-979a-78cd88116916/1trkqx743Y.lottie"></iframe>
        </div>

        <div class="info-2">
            <div class="cnt1-2">
                <img class="logo_img-1 logo_img_2-1"
                    src="https://img.icons8.com/?size=100&id=32242&format=png&color=000000" alt="logo" />
                <h1>
                    Hello Again!
                </h1>
            </div>

            <form class="form-2" action="/home.html">
                <div class="cnt2-2">
                    <!--Eductiona Service-->
                    <fieldset class="inp_cnt1-2">
                        <legend>Eductional Service</legend>
                        <input class="inp edu_inp-2" placeholder="Enter Eduction Service" type="text" required />

                        <div class="edu_serv_list-2">
                            <ul class="ed">
                                <li>College of digiatal Excellence</li>
                                <li>Ipam</li>
                                <li>FBC</li>
                                <li>Limkonkwing</li>
                            </ul>
                        </div>
                    </fieldset>

                    <!--Login type-->
                    <div class="cnt3-2 a1-2">
                        <fieldset class="inp_cnt1-2">
                            <legend>Login Type</legend>

                            <input class="inp edu_inp-2" type="text" />
                            <div class="edu_serv_list-2">
                                <ul>
                                    <li>Student</li>
                                    <li>Lecturer</li>
                                    <li>Admin</li>
                                </ul>
                            </div>
                        </fieldset>
                        <p class="hint-2">Enter the type of login needed</p>
                    </div>

                    <div class="cnt3-2">
                        <fieldset class="inp_cnt1-2">
                            <legend>ID</legend>
                            <input class="inp" placeholder="ID:********" type="password" required />

                        </fieldset>

                        <!--Remeber me section and Forget password section-->
                        <div class="child_cnt-2">

                            <!--Remeber me-->
                            <div class="sub_child_cnt-2">
                                <input class="check_box-2" type="checkbox">
                                <span>Remember Me</span>
                            </div>
                            <!--Forget password-->
                            <a class="fgt-2" href="#">Forget ID</a>
                        </div>
                    </div>
                </div>
                <button class="submit_btn-2" type="submit">Login</button>
            </form>
            <p class="info2-2">You can register your Educational Service at <a href="#">easyeduregister.com</a></p>
        </div>

    </div>
</body>

</html>
