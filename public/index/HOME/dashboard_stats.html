<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="main_page" class="home_screen">
        <div class="top_bar-5">
            <h2 class="overView">Overview</h2>

            <div class="top_bar_counts-5">

                <div class="status_card-5">
                    <!--Total number of resources-->
                    <div class="status_card_tp_cnt-5">
                        <span><strong>Number of Resources</strong></span>
                    </div>

                    <div class="status_card_mid_cnt-5">
                        <div class="num_cnt-5">
                            <span>740</span>
                        </div>
                        <div class="rating_cnt">
                            <img src="" />
                            <span>15%</span>
                        </div>
                    </div>

                    <div class="btm_cnt-5">
                        <span>View Details</span>
                    </div>

                </div>

                <div class="status_card-5">
                    <!--Batches enrolled-->
                    <div class="status_card_tp_cnt-5">
                        <span><strong>Batches Enrolled</strong></span>
                    </div>

                    <div class="status_card_mid_cnt-5">
                        <div class="num_cnt-5">
                            <span>2</span>
                        </div>
                        <div class="rating_cnt">
                            <img src="" />
                            <span>50%</span>
                        </div>
                    </div>

                    <div class="btm_cnt-5">
                        <span>View Details</span>
                    </div>

                </div>
                <div class="status_card-5">
                    <!--Recently access courses-->
                    <div class="status_card_tp_cnt-5">
                        <span><strong>Recently Access</strong></span>
                    </div>

                    <!--Mid layer of the card-->
                    <div class="status_card_mid_cnt-5">
                        <div class="num_cnt-5">
                            <span>0</span>
                        </div>
                        <div class="rating_cnt negative">
                            <img src="" />
                            <span>-20%</span>
                        </div>
                    </div>

                    <div class="btm_cnt-5">
                        <span>View Details</span>
                    </div>

                </div>

                <div class="status_card-5">
                    <!--Total access module-->
                    <div class="status_card_tp_cnt-5">
                        <span><strong>Accessed Modules</strong></span>
                    </div>

                    <!--Mid layer of the card-->
                    <div class="status_card_mid_cnt-5">
                        <div class="num_cnt-5">
                            <span>53</span>
                        </div>
                        <div class="rating_cnt negative">
                            <img src="" />
                            <span>-78%</span>
                        </div>
                    </div>

                    <div class="btm_cnt-5">
                        <span>View Details</span>
                    </div>

                </div>
            </div>
        </div>

        <section class="module_stat_sec-5">
            <div class="stat_cnt-5">

                <div class="top_stat_cnt-5">
                    <h3>Modules Stats</h3>
                    <img src="" alt="elipse" />
                </div>

                <div class="bar_chat-5">
                    <div class="y_label-5">
                        <span class="y_label_txt-5">Total Files</span>
                    </div>

                    <div class="graph_values-5">
                        <ul class="lst_val-5">
                            <li>
                                <span>50</span>
                                <div class="g_lines-5"><!--lines--></div>
                            </li>
                            <li>
                                <span>40</span>
                                <div class="g_lines-5"><!--lines--></div>
                            </li>
                            <li>
                                <span>30</span>
                                <div class="g_lines-5"><!--lines--></div>
                            </li>
                            <li>
                                <span>20</span>
                                <div class="g_lines-5"><!--lines--></div>
                            </li>
                            <li>
                                <span>10</span>
                                <div class="g_lines-5"><!--lines--></div>
                            </li>
                            <li>
                                <span>0</span>
                                <div class="g_lines-5"><!--lines--></div>
                            </li>
                        </ul>

                    </div>

                </div>
                <!--End of graph values======================-->

                <div class="bar_sec_cnt-5">
                    <!-- Add your bars here -->
                    <div class="bar_cn">
                        <div class="bar" style="height: 45%; "></div>
                        <span>AE</span>
                    </div>

                    <div class="bar_cn">
                        <div class="bar" style="height: 60%; "></div>
                        <span>Lin</span>
                    </div>

                    <div class="bar_cn">
                        <div class="bar" style="height: 68%; "></div>
                        <span>C++</span>
                    </div>

                    <div class="bar_cn">
                        <div class="bar" style="height: 71%; "></div>
                        <span>LB</span>
                    </div>

                    <div class="bar_cn">
                        <div class="bar" style="height: 79%; "></div>
                        <span>MS</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="recent_file_section-5">
            <!--Recent file-->
            <div class="recent_file_cnt-5">
                <div>
                    <h4 class="recent_file_se"></h4>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
